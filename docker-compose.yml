services:
  db:
    image: postgis/postgis:15-3.3
    container_name: golden-hour-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: goldenhour
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: golden-hour-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    container_name: golden-hour-backend
    # --reload watches the bind-mounted ./backend directory for file changes.
    # docker-entrypoint.sh now passes "$@" to exec, so this command is used
    # instead of the Dockerfile CMD default.
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "8000:8000"
    environment:
      # DB host is 'db' (the container name), NOT localhost.
      # localhost inside a container refers to the container itself.
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/goldenhour
      - REDIS_URL=redis://redis:6379
      # Override SECRET_KEY in production via your deployment platform's env vars.
      # For local dev the default below is fine.
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - ENVIRONMENT=development
    volumes:
      - ./backend:/app
      - ./data:/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Image-backed backend with no host bind-mount.
  # Use this for one-off commands so the baked image code runs, not the host filesystem.
  # Example: docker compose run --rm backend_image python -m scripts.import_csv --force
  backend_image:
    build: ./backend
    container_name: golden-hour-backend-image
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/goldenhour
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - ENVIRONMENT=development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
